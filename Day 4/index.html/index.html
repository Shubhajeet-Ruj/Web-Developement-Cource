<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3</title>
</head>
<body>
    <form>
        <h1>Student Details</h1>
        <label>Name:</label>
    <input type="text" placeholder="Enter your name" required><br>

        <label>Email:</label>
        <input type="email" placeholder="Enter your Email" required><br>

        <label>Age:</label>
        <input type="number" placeholder="Enter your age" required><br>

        <label>Password:</label>
        <input type="password" placeholder="Enter your password" required><br>
        
        <label>Birthday:</label>
        <input type="date" placeholder="Enter your birthday" required><br>

    <hr>
    <h2>Gender</h2>
    <input type="radio" name="gender" value="male" required> Male<br>
    <input type="radio" name="gender" value="female" required> Female<br>

    <hr>
    <h2>Skills</h2>
    <input type="checkbox" name="Skills" value="HTML"> HTML <br>
    <input type="checkbox" name="Skills" value="CSS"> CSS <br>
    <input type="checkbox" name="Skills" value="JavaScript"> JavaScript <br>

    <button type="submit">Submit</button>
    <hr>


    <table border="1">
        <tr>
            <th>Subjects</th> 
            <th>Marks</th>
        </tr>
        <tr>
            <td>HTML</td>
            <td>95</td>
        </tr>
        <tr>
            <td>CSS</td>
            <td>90</td>
        </tr>
        <tr>
            <td>JavaScript</td>
            <td>85</td>
        </tr>

    </table>
    </form>
</body>
</html>
